<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>灵瑞集 · 暖心陪伴 — 海报</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #3a2a1a;
    padding: 20px;
  }

  .poster {
    width: 750px;
    height: 1334px;
    background: linear-gradient(180deg, #fef9f2 0%, #fdf4e8 30%, #f9ede0 60%, #fef9f2 100%);
    position: relative;
    overflow: hidden;
    font-family: 'STSong', 'Songti SC', 'Noto Serif SC', 'KaiTi', 'SimSun', serif;
    box-shadow: 0 8px 40px rgba(0,0,0,0.3);
  }

  /* Background decorations */
  .bg-circle-1 {
    position: absolute;
    width: 500px; height: 500px;
    border-radius: 50%;
    border: 1px solid rgba(193, 115, 74, 0.1);
    top: -120px; right: -120px;
  }
  .bg-circle-2 {
    position: absolute;
    width: 350px; height: 350px;
    border-radius: 50%;
    border: 1px solid rgba(193, 115, 74, 0.08);
    bottom: 200px; left: -80px;
  }
  .bg-dot {
    position: absolute;
    width: 4px; height: 4px;
    border-radius: 50%;
    background: rgba(193, 115, 74, 0.2);
  }

  /* Top ornament */
  .top-ornament {
    text-align: center;
    padding-top: 60px;
    position: relative;
    z-index: 1;
  }

  .top-line {
    width: 40px; height: 1px;
    background: #c1734a;
    margin: 0 auto 16px;
  }

  .top-label {
    font-size: 14px;
    color: #b8936e;
    letter-spacing: 6px;
  }

  /* Main title */
  .title-area {
    text-align: center;
    padding: 24px 60px 0;
    position: relative;
    z-index: 1;
  }

  .main-title {
    font-size: 42px;
    font-weight: bold;
    color: #4a3728;
    letter-spacing: 6px;
    line-height: 1.4;
  }

  .main-title .accent {
    color: #c1734a;
    font-size: 48px;
  }

  .sub-title {
    font-size: 18px;
    color: #7d6b5d;
    margin-top: 12px;
    letter-spacing: 3px;
  }

  .divider-ornament {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin: 24px 0;
    position: relative;
    z-index: 1;
  }
  .divider-ornament .line { width: 60px; height: 1px; background: #d4a574; }
  .divider-ornament .diamond { width: 8px; height: 8px; background: #c1734a; transform: rotate(45deg); }

  /* Tagline */
  .tagline {
    text-align: center;
    font-size: 15px;
    color: #8b7b6b;
    line-height: 2.2;
    padding: 0 80px;
    position: relative;
    z-index: 1;
  }

  /* Pet showcase */
  .pet-showcase {
    display: flex;
    justify-content: center;
    gap: 20px;
    padding: 32px 40px;
    position: relative;
    z-index: 1;
  }

  .pet-item {
    text-align: center;
    width: 110px;
  }

  .pet-item .pet-img-wrap {
    width: 90px; height: 90px;
    margin: 0 auto 8px;
    border-radius: 50%;
    background: #fffdf8;
    border: 2px solid #e8c9a0;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    box-shadow: 0 2px 12px rgba(180, 140, 100, 0.1);
  }

  .pet-item .pet-img-wrap img {
    width: 70px; height: 70px;
    object-fit: contain;
  }

  .pet-item .pet-name-small {
    font-size: 14px;
    font-weight: bold;
    color: #4a3728;
  }
  .pet-item .pet-role-small {
    font-size: 10px;
    color: #b8936e;
    margin-top: 2px;
  }

  /* Features */
  .features {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 12px;
    padding: 0 60px;
    position: relative;
    z-index: 1;
  }

  .feature-tag {
    padding: 8px 18px;
    border: 1px solid #d4a574;
    border-radius: 20px;
    font-size: 13px;
    color: #7d6b5d;
    background: rgba(253, 246, 240, 0.6);
    letter-spacing: 1px;
  }

  /* Emotion keywords */
  .emotion-bar {
    display: flex;
    justify-content: center;
    gap: 24px;
    padding: 28px 60px 20px;
    position: relative;
    z-index: 1;
  }

  .emotion-item {
    text-align: center;
  }

  .emotion-icon {
    font-size: 28px;
    margin-bottom: 6px;
  }

  .emotion-text {
    font-size: 12px;
    color: #7d6b5d;
    letter-spacing: 1px;
  }

  /* Bottom */
  .bottom-area {
    text-align: center;
    padding: 16px 60px 0;
    position: relative;
    z-index: 1;
  }

  .cta-text {
    font-size: 17px;
    color: #c1734a;
    font-weight: bold;
    letter-spacing: 3px;
  }

  .qr-placeholder {
    width: 80px; height: 80px;
    margin: 16px auto;
    border: 1px solid #e0d3c0;
    border-radius: 8px;
    background: #fffdf8;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    color: #b8936e;
  }

  .footer-text {
    font-size: 13px;
    color: #b8936e;
    letter-spacing: 2px;
  }

  /* Corner seals */
  .seal {
    position: absolute;
    width: 60px; height: 60px;
    border: 2px solid #c1734a;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    color: #c1734a;
    font-weight: bold;
    letter-spacing: 2px;
    transform: rotate(-15deg);
    opacity: 0.7;
  }
  .seal.top-right { top: 40px; right: 40px; }
  .seal.bottom-left { bottom: 80px; left: 40px; transform: rotate(10deg); }

  /* Cloud ornaments */
  .cloud {
    position: absolute;
    opacity: 0.06;
    font-size: 120px;
    z-index: 0;
  }
  .cloud.c1 { top: 180px; left: -20px; }
  .cloud.c2 { bottom: 300px; right: -30px; font-size: 100px; }
</style>
</head>
<body>

<div class="poster">
  <!-- Background -->
  <div class="bg-circle-1"></div>
  <div class="bg-circle-2"></div>
  <div class="cloud c1">☁</div>
  <div class="cloud c2">☁</div>

  <!-- Seals -->
  <div class="seal top-right">暖心<br>陪伴</div>
  <div class="seal bottom-left">灵瑞<br>之约</div>

  <!-- Top -->
  <div class="top-ornament">
    <div class="top-line"></div>
    <div class="top-label">灵 瑞 集 呈 献</div>
  </div>

  <!-- Title -->
  <div class="title-area">
    <div class="main-title">
      校园<span class="accent">情绪陪伴</span><br>互动小游戏
    </div>
    <div class="sub-title">灵瑞集 · 暖心陪伴</div>
  </div>

  <div class="divider-ornament">
    <span class="line"></span><span class="diamond"></span><span class="line"></span>
  </div>

  <!-- Tagline -->
  <div class="tagline">
    选一只国风瑞兽灵宠<br>
    陪你度过低落时刻<br>
    温柔对白 · 情绪疏导 · 自我和解
  </div>

  <!-- Pet lineup -->
  <div class="pet-showcase">
    <div class="pet-item">
      <div class="pet-img-wrap"><img src="photo/白泽.png" alt="白泽"></div>
      <div class="pet-name-small">白泽</div>
      <div class="pet-role-small">学业智慧</div>
    </div>
    <div class="pet-item">
      <div class="pet-img-wrap"><img src="photo/九尾狐.png" alt="九尾狐"></div>
      <div class="pet-name-small">九尾狐</div>
      <div class="pet-role-small">情绪树洞</div>
    </div>
    <div class="pet-item">
      <div class="pet-img-wrap"><img src="photo/天禄1.png" alt="天禄"></div>
      <div class="pet-name-small">天禄</div>
      <div class="pet-role-small">元气开运</div>
    </div>
    <div class="pet-item">
      <div class="pet-img-wrap"><img src="photo/玄龟.png" alt="玄龟"></div>
      <div class="pet-name-small">玄龟</div>
      <div class="pet-role-small">沉稳静心</div>
    </div>
    <div class="pet-item">
      <div class="pet-img-wrap"><img src="photo/辟邪.png" alt="辟邪"></div>
      <div class="pet-name-small">辟邪</div>
      <div class="pet-role-small">安全感守护</div>
    </div>
  </div>

  <!-- Feature tags -->
  <div class="features">
    <span class="feature-tag">🎓 大学生专属</span>
    <span class="feature-tag">🏮 国风治愈</span>
    <span class="feature-tag">💬 剧情选择</span>
    <span class="feature-tag">🧘 情绪疏导</span>
    <span class="feature-tag">📿 专属灵宠</span>
    <span class="feature-tag">🃏 反馈卡片</span>
  </div>

  <!-- Emotion range -->
  <div class="emotion-bar">
    <div class="emotion-item">
      <div class="emotion-icon">📚</div>
      <div class="emotion-text">学业焦虑</div>
    </div>
    <div class="emotion-item">
      <div class="emotion-icon">💧</div>
      <div class="emotion-text">情绪内耗</div>
    </div>
    <div class="emotion-item">
      <div class="emotion-icon">🍂</div>
      <div class="emotion-text">动力缺失</div>
    </div>
    <div class="emotion-item">
      <div class="emotion-icon">💭</div>
      <div class="emotion-text">浮躁迷茫</div>
    </div>
    <div class="emotion-item">
      <div class="emotion-icon">🛡️</div>
      <div class="emotion-text">内心不安</div>
    </div>
  </div>

  <!-- Bottom CTA -->
  <div class="bottom-area">
    <div class="cta-text">扫码开启暖心陪伴</div>
    <img class="qr-placeholder" src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=http://10.10.153.192:8080/index.html" alt="扫码进入游戏" style="width:120px;height:120px;border-radius:8px;">
    <div class="footer-text">灵瑞集 · 暖心陪伴 · 校园情绪治愈小游戏</div>
  </div>
</div>

</body>
</html>
